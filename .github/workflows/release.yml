name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: cargo-publish
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
      - name: Install GTK3
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev
      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"
          CARGO_VER=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "installrs") | .version')
          if [ "$TAG" != "v$CARGO_VER" ]; then
            echo "Tag $TAG does not match Cargo.toml version v$CARGO_VER" >&2
            exit 1
          fi
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: crates-auth
      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

  binaries:
    name: Build binary (${{ matrix.target }})
    needs: crates-io
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}
      - name: Install GTK3
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev
      - name: Build from published crate
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cargo install installrs --locked --version "$VERSION" --target ${{ matrix.target }} --root dist
      - name: Stage binary
        shell: bash
        run: |
          NAME="installrs-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$NAME"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/bin/installrs.exe "$NAME/"
          else
            cp dist/bin/installrs "$NAME/"
          fi
          cp LICENSE.txt README.md "$NAME/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "$NAME.zip" "$NAME"
            echo "ASSET=$NAME.zip" >> "$GITHUB_ENV"
          else
            tar czf "$NAME.tar.gz" "$NAME"
            echo "ASSET=$NAME.tar.gz" >> "$GITHUB_ENV"
          fi
      - name: Compute SHA-256
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile "$ASSET" SHA256 | grep -v ':' | tr -d ' \r\n' > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" | awk '{print $1}' > "$ASSET.sha256"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: [crates-io, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
